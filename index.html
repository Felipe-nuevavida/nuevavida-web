<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nueva Vida - Premium Hochzeits- und Geschenkartikel für unvergessliche Momente.">
    <title>Nueva Vida - Premium Hochzeits- & Geschenkartikel</title>
    <style>
        /* ========================================
           VARIABLES & RESET
           ======================================== */
        :root {
            --color-dark: #2c3e50;
            --color-gold: #d4af37;
            --color-light: #f9f9f9;
            --color-white: #ffffff;
            --color-text: #3a3a3a;
            --color-border: #e8e8e8;
            --font-display: 'Playfair Display', serif;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Lato', sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-medium: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-gold: 0 4px 16px rgba(212, 175, 55, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background-color: var(--color-white);
            line-height: 1.6;
        }

        /* ========================================
           HEADER & NAVIGATION
           ======================================== */
        header {
            background-color: var(--color-white);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--color-dark);
            letter-spacing: -0.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--color-text);
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
            transition: var(--transition);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--color-gold);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Mobile Menu */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                gap: 1.5rem;
            }

            .header-container {
                flex-direction: column;
                gap: 1.5rem;
            }

            .brand-name {
                font-size: 1.4rem;
            }
        }

        /* ========================================
           HERO SECTION
           ======================================== */
        .hero {
            position: relative;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--color-light) 0%, #efefef 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.7) 0%, rgba(44, 62, 80, 0.5) 100%);
            z-index: 1;
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            color: var(--color-white);
            margin-bottom: 1.5rem;
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 2rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .hero-cta {
            display: inline-block;
            background-color: var(--color-gold);
            color: var(--color-dark);
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-gold);
            text-decoration: none;
        }

        .hero-cta:hover {
            background-color: #e5c158;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.35);
        }

        @media (max-width: 768px) {
            .hero {
                min-height: 400px;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero p {
                font-size: 1rem;
            }
        }

        /* ========================================
           ANIMATIONS
           ======================================== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .fade-in-on-scroll {
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        /* ========================================
           PRODUCTO ACTIVO
           ======================================== */
        .product-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 5rem 2rem;
            background-color: var(--color-white);
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }
